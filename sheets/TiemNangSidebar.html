<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans', Arial, sans-serif;
      font-size: 13px;
      color: #202124;
      background: #f8f9fa;
    }

    .header {
      background: #37474f;
      color: white;
      padding: 13px 16px;
      font-size: 15px;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header small {
      display: block;
      font-size: 11px;
      font-weight: 400;
      opacity: 0.8;
      margin-top: 2px;
    }

    .form-body { padding: 12px 16px 80px; }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin: 16px 0 8px;
      padding: 5px 8px;
      border-radius: 4px;
    }
    .sl-uv   { background: #e8f0fe; color: #1a3c5e; }
    .sl-yc   { background: #e8f5e9; color: #2e7d32; }
    .sl-note { background: #eceff1; color: #546e7a; }

    .field { margin-bottom: 10px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    label .req { color: #e8305a; margin-left: 2px; }

    input, select, textarea {
      width: 100%;
      border: 1px solid #dadce0;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
      color: #202124;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #2D2CDB;
      box-shadow: 0 0 0 2px rgba(45,44,219,0.12);
    }
    textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 10px 16px;
      background: #fff;
      border-top: 1px solid #e8eaed;
      display: flex;
      gap: 8px;
    }
    .btn-save {
      flex: 1;
      background: #37474f;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover    { background: #263238; }
    .btn-save:disabled { background: #9aa0a6; cursor: not-allowed; }
    .btn-clear {
      background: transparent;
      color: #5f6368;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-clear:hover { background: #f1f3f4; }

    .toast {
      position: fixed;
      bottom: 68px; left: 16px; right: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      display: none;
      z-index: 100;
      text-align: center;
    }
    .toast.success { background: #e6f4ea; color: #137333; border: 1px solid #b7dfbf; }
    .toast.error   { background: #fce8e6; color: #c5221f; border: 1px solid #f5c6c4; }
  </style>
</head>
<body>

<div class="header">
  🔖 Ứng viên tiềm năng
  <small>Chưa có job phù hợp — lưu lại để tư vấn sau</small>
</div>

<div class="form-body">

  <!-- ── THÔNG TIN CÁ NHÂN ── -->
  <div class="section-label sl-uv">Thông tin cá nhân</div>

  <div class="field">
    <label>Họ và tên <span class="req">*</span></label>
    <input type="text" id="hoTen" placeholder="VD: Nguyễn Thị Bình">
  </div>

  <div class="row2">
    <div class="field">
      <label>SĐT <span class="req">*</span></label>
      <input type="tel" id="sdt" placeholder="0912 345 678">
    </div>
    <div class="field">
      <label>Zalo</label>
      <input type="text" id="zalo" placeholder="SĐT Zalo">
    </div>
  </div>

  <div class="row2">
    <div class="field">
      <label>Ngày sinh</label>
      <input type="date" id="ngaySinh">
    </div>
    <div class="field">
      <label>Giới tính</label>
      <select id="gioiTinh">
        <option value="Nam">Nam</option>
        <option value="Nữ">Nữ</option>
      </select>
    </div>
  </div>

  <div class="row2">
    <div class="field">
      <label>Tỉnh / TP (VN)</label>
      <input type="text" id="tinh" placeholder="VD: Nghệ An">
    </div>
    <div class="field">
      <label>Tiếng Nhật</label>
      <select id="tiengNhat">
        <option value="Không có">Không có</option>
        <option value="N5">N5</option>
        <option value="N4">N4</option>
        <option value="N3">N3</option>
        <option value="N2">N2</option>
        <option value="N1">N1</option>
      </select>
    </div>
  </div>

  <!-- ── YÊU CẦU / MONG MUỐN ── -->
  <div class="section-label sl-yc">Mong muốn & yêu cầu</div>

  <div class="row2">
    <div class="field">
      <label>Loại đơn quan tâm</label>
      <select id="loaiDon" onchange="onTypeChange()">
        <option value="">Chưa rõ</option>
        <option value="viet">Tokutei Đầu Việt (VN→JP)</option>
        <option value="nhat">Tokutei Đầu Nhật (đang ở JP)</option>
        <option value="kysis">Kỹ sư IT</option>
      </select>
    </div>
    <div class="field">
      <label>Yêu cầu lương</label>
      <input type="text" id="ycLuong" placeholder="VD: 180.000 yên+">
    </div>
  </div>

  <div class="field">
    <label>Ngành nghề quan tâm</label>
    <select id="nganh">
      <option value="">-- Tất cả ngành --</option>
    </select>
  </div>

  <!-- ── GHI CHÚ ── -->
  <div class="section-label sl-note">Ghi chú & kinh nghiệm</div>

  <div class="field">
    <textarea id="ghiChu" placeholder="Kinh nghiệm làm việc, chứng chỉ, nguyện vọng, tình trạng hộ chiếu, lý do muốn đi Nhật..."></textarea>
  </div>

</div>

<div class="toast" id="toast"></div>

<div class="footer">
  <button class="btn-clear" onclick="clearForm()" title="Xóa form">↺</button>
  <button class="btn-save" id="btnSave" onclick="submitForm()">Lưu tiềm năng</button>
</div>

<script>
  const TOKUTEI_CATS = [
    'Chế biến thực phẩm','Nhóm ngành 1 (Cơ khí)','Nhóm ngành 2 (Điện tử)',
    'Xây dựng','Điều dưỡng','Nhà hàng','Vệ sinh tòa nhà','Bảo dưỡng ô tô',
    'Nông nghiệp','Lưu trú / Khách sạn','Ngư nghiệp','Đóng tàu','Hàng không',
    'Vận tải','Lâm nghiệp','May','In ấn',
  ];
  const KYSIS_CATS = [
    'Lập trình viên','Kỹ sư hệ thống / Mạng','AI & Data Science',
    'Cơ khí','Điện - Điện tử','Hóa học & Vật liệu','Ô tô',
    'Phiên dịch / Thông dịch','Xuất nhập khẩu','Quản trị kinh doanh / Marketing',
  ];

  function onTypeChange() {
    const type = document.getElementById('loaiDon').value;
    const sel  = document.getElementById('nganh');
    sel.innerHTML = '';
    const ph = document.createElement('option');
    ph.value = ''; ph.textContent = '-- Tất cả ngành --';
    sel.appendChild(ph);
    const list = type === 'kysis' ? KYSIS_CATS : (type ? TOKUTEI_CATS : []);
    list.forEach(c => {
      const opt = document.createElement('option');
      opt.value = opt.textContent = c;
      sel.appendChild(opt);
    });
  }

  function submitForm() {
    const get = id => document.getElementById(id).value.trim();

    if (!get('hoTen')) { showToast('Vui lòng nhập họ tên', 'error'); return; }
    if (!get('sdt'))   { showToast('Vui lòng nhập số điện thoại', 'error'); return; }

    const data = {
      hoTen:     get('hoTen'),
      sdt:       get('sdt'),
      zalo:      get('zalo'),
      ngaySinh:  get('ngaySinh'),
      gioiTinh:  get('gioiTinh'),
      tinh:      get('tinh'),
      tiengNhat: get('tiengNhat'),
      loaiDon:   get('loaiDon'),
      nganh:     get('nganh'),
      ycLuong:   get('ycLuong'),
      ghiChu:    get('ghiChu'),
    };

    const btn = document.getElementById('btnSave');
    btn.disabled = true; btn.textContent = 'Đang lưu...';

    google.script.run
      .withSuccessHandler(() => {
        showToast('✅ Đã lưu ứng viên tiềm năng!', 'success');
        clearForm();
        btn.disabled = false; btn.textContent = 'Lưu tiềm năng';
      })
      .withFailureHandler(err => {
        showToast('❌ ' + err.message, 'error');
        btn.disabled = false; btn.textContent = 'Lưu tiềm năng';
      })
      .saveTiemNang(data);
  }

  function clearForm() {
    ['hoTen','sdt','zalo','tinh','ycLuong','ghiChu'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('ngaySinh').value  = '';
    document.getElementById('gioiTinh').value  = 'Nam';
    document.getElementById('tiengNhat').value = 'Không có';
    document.getElementById('loaiDon').value   = '';
    onTypeChange();
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
    t.style.display = 'block';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.style.display = 'none', 3200);
  }
</script>
</body>
</html>
