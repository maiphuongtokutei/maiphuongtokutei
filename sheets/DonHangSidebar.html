<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans', Arial, sans-serif;
      font-size: 13px;
      color: #202124;
      background: #f8f9fa;
    }

    .header {
      background: #1a3c5e;
      color: white;
      padding: 13px 16px;
      font-size: 15px;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .form-body { padding: 12px 16px 80px; }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin: 16px 0 8px;
      padding: 5px 8px;
      border-radius: 4px;
    }
    .sl-uv   { background: #e8f0fe; color: #1a3c5e; }
    .sl-don  { background: #e8f5e9; color: #2e7d32; }
    .sl-viet { background: #fbe9e7; color: #bf360c; }
    .sl-nhat { background: #e3f2fd; color: #1565c0; }
    .sl-ctv  { background: #ede7f6; color: #6a1b9a; }
    .sl-note { background: #eceff1; color: #546e7a; }

    .field { margin-bottom: 10px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    label .req { color: #e8305a; margin-left: 2px; }

    input, select, textarea {
      width: 100%;
      border: 1px solid #dadce0;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
      color: #202124;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #2D2CDB;
      box-shadow: 0 0 0 2px rgba(45,44,219,0.12);
    }
    textarea { resize: vertical; min-height: 68px; line-height: 1.5; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Status chips */
    .status-bar { display: flex; gap: 4px; flex-wrap: wrap; }
    .chip {
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: 2px solid transparent;
      white-space: nowrap;
      transition: border-color 0.12s;
    }
    .chip.active { border-color: #2D2CDB !important; }
    .c-moi   { background: #f8f9fa; color: #546e7a; }
    .c-cbhs  { background: #fff8e1; color: #e65100; }
    .c-dhs   { background: #e8f5e9; color: #2e7d32; }
    .c-pv    { background: #f3e5f5; color: #7b1fa2; }
    .c-dau   { background: #dcedc8; color: #33691e; }
    .c-xc    { background: #c8e6c9; color: #1b5e20; }
    .c-rot   { background: #ffcdd2; color: #b71c1c; }
    .c-huy   { background: #eeeeee; color: #616161; }

    /* Toggle checkbox */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 6px 0;
    }
    .toggle-row input[type=checkbox] { width: auto; accent-color: #6a1b9a; }
    .toggle-row span { font-size: 12px; font-weight: 600; color: #6a1b9a; }

    .finance-block, .ctv-block { display: none; }
    .finance-block.show, .ctv-block.show { display: block; }

    .footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 10px 16px;
      background: #fff;
      border-top: 1px solid #e8eaed;
      display: flex;
      gap: 8px;
    }
    .btn-save {
      flex: 1;
      background: #2D2CDB;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover    { background: #1e1db8; }
    .btn-save:disabled { background: #9aa0a6; cursor: not-allowed; }
    .btn-clear {
      background: transparent;
      color: #5f6368;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-clear:hover { background: #f1f3f4; }

    .toast {
      position: fixed;
      bottom: 68px; left: 16px; right: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      display: none;
      z-index: 100;
      text-align: center;
    }
    .toast.success { background: #e6f4ea; color: #137333; border: 1px solid #b7dfbf; }
    .toast.error   { background: #fce8e6; color: #c5221f; border: 1px solid #f5c6c4; }

    .hint { font-size: 11px; color: #9aa0a6; margin-top: 3px; }
    .no-ctv-hint { font-size: 11px; color: #e65100; margin-top: 4px; display: none; }
  </style>
</head>
<body>

<div class="header">📋 Thêm đơn hàng mới</div>

<div class="form-body">

  <!-- ── THÔNG TIN ỨNG VIÊN ── -->
  <div class="section-label sl-uv">Thông tin ứng viên</div>

  <div class="field">
    <label>Họ và tên <span class="req">*</span></label>
    <input type="text" id="hoTen" placeholder="VD: Nguyễn Văn An">
  </div>

  <div class="row2">
    <div class="field">
      <label>SĐT <span class="req">*</span></label>
      <input type="tel" id="sdt" placeholder="0912 345 678">
    </div>
    <div class="field">
      <label>Zalo</label>
      <input type="text" id="zalo" placeholder="SĐT Zalo">
    </div>
  </div>

  <div class="row2">
    <div class="field">
      <label>Ngày sinh</label>
      <input type="date" id="ngaySinh">
    </div>
    <div class="field">
      <label>Giới tính</label>
      <select id="gioiTinh">
        <option value="Nam">Nam</option>
        <option value="Nữ">Nữ</option>
      </select>
    </div>
  </div>

  <div class="row2">
    <div class="field">
      <label>Tỉnh / TP (VN)</label>
      <input type="text" id="tinh" placeholder="VD: Hà Nội">
    </div>
    <div class="field">
      <label>Tiếng Nhật</label>
      <select id="tiengNhat">
        <option value="Không có">Không có</option>
        <option value="N5">N5</option>
        <option value="N4">N4</option>
        <option value="N3">N3</option>
        <option value="N2">N2</option>
        <option value="N1">N1</option>
      </select>
    </div>
  </div>

  <!-- ── THÔNG TIN ĐƠN HÀNG ── -->
  <div class="section-label sl-don">Thông tin đơn hàng</div>

  <div class="row2">
    <div class="field">
      <label>Loại đơn <span class="req">*</span></label>
      <select id="loaiDon" onchange="onLoaiDonChange()">
        <option value="">-- Chọn --</option>
        <option value="viet">Tokutei Đầu Việt (VN→JP)</option>
        <option value="nhat">Tokutei Đầu Nhật (đang ở JP)</option>
        <option value="kysis">Kỹ sư IT</option>
      </select>
    </div>
    <div class="field">
      <label>Đối tác</label>
      <input type="text" id="doiTac" placeholder="VD: Công ty ABC Nhật">
    </div>
  </div>

  <div class="field">
    <label>Ngành nghề <span class="req">*</span></label>
    <select id="nganh">
      <option value="">-- Chọn loại đơn trước --</option>
    </select>
  </div>

  <div class="field">
    <label>Tên công việc cụ thể</label>
    <input type="text" id="tenCv" placeholder="VD: Công nhân chế biến thực phẩm tại Aichi">
  </div>

  <!-- Trạng thái -->
  <div class="field">
    <label>Trạng thái</label>
    <div class="status-bar">
      <span class="chip c-moi  active" data-val="Mới đăng ký"            onclick="selectStatus(this)">Mới</span>
      <span class="chip c-cbhs"        data-val="Đang chuẩn bị hồ sơ"   onclick="selectStatus(this)">Chuẩn bị HS</span>
      <span class="chip c-dhs"         data-val="Đã nộp hồ sơ"          onclick="selectStatus(this)">Đã nộp HS</span>
      <span class="chip c-pv"          data-val="Phỏng vấn"              onclick="selectStatus(this)">Phỏng vấn</span>
      <span class="chip c-dau"         data-val="Đậu - Chờ xuất cảnh ✅" onclick="selectStatus(this)">Đậu ✅</span>
      <span class="chip c-xc"          data-val="Đã xuất cảnh 🎉"        onclick="selectStatus(this)">Xuất cảnh 🎉</span>
      <span class="chip c-rot"         data-val="Rớt ❌"                 onclick="selectStatus(this)">Rớt ❌</span>
      <span class="chip c-huy"         data-val="Tự hủy"                 onclick="selectStatus(this)">Hủy</span>
    </div>
    <input type="hidden" id="trangThai" value="Mới đăng ký">
  </div>

  <!-- ── TÀI CHÍNH ĐẦU VIỆT ── -->
  <div id="block-viet" class="finance-block">
    <div class="section-label sl-viet">Tài chính — Đầu Việt</div>
    <div class="row2">
      <div class="field">
        <label>Hoa hồng</label>
        <input type="text" id="hoaHongViet" placeholder="VD: 5.000.000đ">
      </div>
      <div class="field">
        <label>Đã thu chưa</label>
        <select id="ttThuViet">
          <option value="Chưa">Chưa</option>
          <option value="Một phần">Một phần</option>
          <option value="Đã xong ✓">Đã xong ✓</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ── TÀI CHÍNH ĐẦU NHẬT ── -->
  <div id="block-nhat" class="finance-block">
    <div class="section-label sl-nhat">Tài chính — Đầu Nhật</div>
    <div class="row2">
      <div class="field">
        <label>Tiền back từ ĐT</label>
        <input type="text" id="tienBackNhat" placeholder="VD: 500 USD">
      </div>
      <div class="field">
        <label>Đã nhận chưa</label>
        <select id="ttNhanNhat">
          <option value="Chưa">Chưa</option>
          <option value="Một phần">Một phần</option>
          <option value="Đã xong ✓">Đã xong ✓</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ── CTV ── -->
  <div class="section-label sl-ctv">CTV giới thiệu</div>

  <label class="toggle-row">
    <input type="checkbox" id="hasCTV" onchange="onCtvToggle()">
    <span>Ứng viên này được CTV giới thiệu</span>
  </label>

  <div id="block-ctv" class="ctv-block">
    <div class="field" style="margin-top:8px">
      <label>Tên CTV</label>
      <select id="ctvGioiThieu">
        <option value="">-- Chọn CTV --</option>
      </select>
      <div class="no-ctv-hint" id="noCtvHint">
        ⚠️ Chưa có CTV nào. Thêm vào tab "CTV" trong sheet trước.
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Tiền trả CTV</label>
        <input type="text" id="tienTraCtv" placeholder="VD: 500.000đ">
      </div>
      <div class="field">
        <label>Đã trả chưa</label>
        <select id="ttTraCtv">
          <option value="Chưa">Chưa</option>
          <option value="Một phần">Một phần</option>
          <option value="Đã xong ✓">Đã xong ✓</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ── GHI CHÚ ── -->
  <div class="section-label sl-note">Ghi chú</div>
  <div class="field">
    <textarea id="ghiChu" placeholder="Ghi chú về hồ sơ, tình trạng, lưu ý đặc biệt..."></textarea>
  </div>

</div>

<div class="toast" id="toast"></div>

<div class="footer">
  <button class="btn-clear" onclick="clearForm()" title="Xóa form">↺</button>
  <button class="btn-save" id="btnSave" onclick="submitForm()">Lưu đơn hàng</button>
</div>

<script>
  const TOKUTEI_CATS = [
    'Chế biến thực phẩm','Nhóm ngành 1 (Cơ khí)','Nhóm ngành 2 (Điện tử)',
    'Xây dựng','Điều dưỡng','Nhà hàng','Vệ sinh tòa nhà','Bảo dưỡng ô tô',
    'Nông nghiệp','Lưu trú / Khách sạn','Ngư nghiệp','Đóng tàu','Hàng không',
    'Vận tải','Lâm nghiệp','May','In ấn',
  ];
  const KYSIS_CATS = [
    'Lập trình viên','Kỹ sư hệ thống / Mạng','AI & Data Science',
    'Cơ khí','Điện - Điện tử','Hóa học & Vật liệu','Ô tô',
    'Phiên dịch / Thông dịch','Xuất nhập khẩu','Quản trị kinh doanh / Marketing',
  ];

  // Load CTV list on open
  google.script.run
    .withSuccessHandler(function(ctvList) {
      const sel = document.getElementById('ctvGioiThieu');
      if (!ctvList || ctvList.length === 0) {
        document.getElementById('noCtvHint').style.display = 'block';
        return;
      }
      ctvList.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.ten;
        opt.textContent = c.sdt ? `${c.ten} (${c.sdt})` : c.ten;
        sel.appendChild(opt);
      });
    })
    .getCtvList();

  function onLoaiDonChange() {
    const type = document.getElementById('loaiDon').value;

    // Update category dropdown
    const sel = document.getElementById('nganh');
    sel.innerHTML = '';
    const ph = document.createElement('option');
    ph.value = ''; ph.textContent = '-- Chọn ngành --';
    sel.appendChild(ph);
    const list = type === 'kysis' ? KYSIS_CATS : (type ? TOKUTEI_CATS : []);
    list.forEach(c => {
      const opt = document.createElement('option');
      opt.value = opt.textContent = c;
      sel.appendChild(opt);
    });

    // Show/hide finance blocks
    const viet = document.getElementById('block-viet');
    const nhat = document.getElementById('block-nhat');
    if (type === 'viet') {
      viet.classList.add('show'); nhat.classList.remove('show');
    } else if (type === 'nhat') {
      nhat.classList.add('show'); viet.classList.remove('show');
    } else if (type === 'kysis') {
      viet.classList.add('show'); nhat.classList.add('show');
    } else {
      viet.classList.remove('show'); nhat.classList.remove('show');
    }
  }

  function onCtvToggle() {
    const checked = document.getElementById('hasCTV').checked;
    document.getElementById('block-ctv').classList.toggle('show', checked);
  }

  function selectStatus(el) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('trangThai').value = el.getAttribute('data-val');
  }

  function submitForm() {
    const get = id => document.getElementById(id).value.trim();

    if (!get('hoTen'))   { showToast('Vui lòng nhập họ tên ứng viên', 'error'); return; }
    if (!get('sdt'))     { showToast('Vui lòng nhập số điện thoại', 'error'); return; }
    if (!get('loaiDon')) { showToast('Vui lòng chọn loại đơn hàng', 'error'); return; }
    if (!get('nganh'))   { showToast('Vui lòng chọn ngành nghề', 'error'); return; }

    const hasCTV = document.getElementById('hasCTV').checked;

    const data = {
      hoTen:        get('hoTen'),
      sdt:          get('sdt'),
      zalo:         get('zalo'),
      ngaySinh:     get('ngaySinh'),
      gioiTinh:     get('gioiTinh'),
      tinh:         get('tinh'),
      tiengNhat:    get('tiengNhat'),
      loaiDon:      get('loaiDon'),
      doiTac:       get('doiTac'),
      nganh:        get('nganh'),
      tenCv:        get('tenCv'),
      trangThai:    get('trangThai'),
      hoaHongViet:  get('hoaHongViet'),
      ttThuViet:    get('ttThuViet'),
      tienBackNhat: get('tienBackNhat'),
      ttNhanNhat:   get('ttNhanNhat'),
      ctvGioiThieu: hasCTV ? get('ctvGioiThieu') : '',
      tienTraCtv:   hasCTV ? get('tienTraCtv')   : '',
      ttTraCtv:     hasCTV ? get('ttTraCtv')      : '',
      ghiChu:       get('ghiChu'),
    };

    const btn = document.getElementById('btnSave');
    btn.disabled = true; btn.textContent = 'Đang lưu...';

    google.script.run
      .withSuccessHandler(() => {
        showToast('✅ Đã lưu đơn hàng!', 'success');
        clearForm();
        btn.disabled = false; btn.textContent = 'Lưu đơn hàng';
      })
      .withFailureHandler(err => {
        showToast('❌ ' + err.message, 'error');
        btn.disabled = false; btn.textContent = 'Lưu đơn hàng';
      })
      .saveDonHang(data);
  }

  function clearForm() {
    const texts = ['hoTen','sdt','zalo','tinh','doiTac','tenCv',
                   'hoaHongViet','tienBackNhat','tienTraCtv','ghiChu'];
    texts.forEach(id => document.getElementById(id).value = '');
    document.getElementById('ngaySinh').value   = '';
    document.getElementById('gioiTinh').value   = 'Nam';
    document.getElementById('tiengNhat').value  = 'Không có';
    document.getElementById('loaiDon').value    = '';
    document.getElementById('ttThuViet').value  = 'Chưa';
    document.getElementById('ttNhanNhat').value = 'Chưa';
    document.getElementById('ttTraCtv').value   = 'Chưa';
    document.getElementById('hasCTV').checked   = false;
    document.getElementById('trangThai').value  = 'Mới đăng ký';
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    document.querySelector('.c-moi').classList.add('active');
    document.getElementById('block-ctv').classList.remove('show');
    onLoaiDonChange();
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
    t.style.display = 'block';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.style.display = 'none', 3200);
  }
</script>
</body>
</html>
